[build]
  publish = "dist/public"
  command = "./build-with-assets.sh"

[build.environment]
  NODE_VERSION = "18"

# SPA routing configuration - serve the React app for all routes
[[redirects]]
  from = "/free-resources"
  to = "/free-resources.html"
  status = 200
  force = true

[[redirects]]
  from = "/free-resources/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200